// ============================================================
// Arma 3 Basic / Network Configuration
// Passed via -cfg= parameter
// Documentation: https://community.bistudio.com/wiki/Arma_3:_Basic_Server_Config_File
// ============================================================

// ----- Language -----------------------------------------------
language            = "English";
adapter             = -1;   // -1 = system default

// ----- Bandwidth / Traffic Control ----------------------------
// Tune these values to match your server's available upload bandwidth.
// Too high → server lag / packet loss; too low → sluggish feel.

MinBandwidth        = 131072;     // bps minimum (128 Kbps)
MaxBandwidth        = 10000000;   // bps maximum (10 Mbps) – set to your uplink

// Maximum number of guaranteed/non-guaranteed packets per frame.
// Raising MaxMsgSend improves responsiveness but increases bandwidth usage.
MaxMsgSend          = 256;        // default 128; raise carefully
MaxSizeGuaranteed   = 512;        // bytes; default 512
MaxSizeNonguaranteed = 256;       // bytes; default 256

// Error tolerance before a position update is sent.
// Lower values = smoother movement, higher bandwidth.
MinErrorToSend      = 0.003;      // default 0.003
MinErrorToSendNear  = 0.01;       // for nearby objects

// ----- Custom File Size Limit ---------------------------------
// Maximum size (bytes) of custom user-created files allowed to transfer.
MaxCustomFileSize   = 0;          // 0 = disabled (recommended for public servers)

// ----- Server Location (used for Steam server browser) --------
serverLongitude     = 10;         // Example: Germany
serverLatitude      = 51;
