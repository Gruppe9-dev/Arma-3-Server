// ============================================================
// Arma 3 Dedicated Server Configuration
// Documentation: https://community.bistudio.com/wiki/Arma_3:_Server_Config_File
// ============================================================

// ----- Server Identity ----------------------------------------
hostname        = "My Arma 3 Server";
passwordAdmin   = "CHANGE_ME_ADMIN";    // #login <password> in-game chat
password        = "";                   // Join password (empty = public)
serverCommandPassword = "CHANGE_ME_RCON"; // RCON / server-side commands

// ----- Players ------------------------------------------------
admins[]        = {
    // Add Steam64 IDs here
    // "76561198000000000"
};

maxPlayers      = 40;
persistent      = 1;   // Keep mission running when no players are connected
                        // Required for -autoInit

// ----- Message of the Day ------------------------------------
motd[]          = {
    "Welcome to My Arma 3 Server",
    "Discord: https://discord.gg/example"
};
motdInterval    = 30;   // seconds between MOTD broadcasts

// ----- Missions -----------------------------------------------
// List missions available in the in-game mission browser.
// template must match the PBO filename (without .pbo) in MPMissions\.
class Missions
{
    class Mission1
    {
        template   = "co40_example.Altis";
        difficulty = "Regular";
        // params = {};
    };
};

// ----- Voting -------------------------------------------------
voteMissionPlayers  = 1;    // Min. players needed to start mission vote
voteThreshold       = 0.33; // 33 % majority required

// ----- Difficulty ---------------------------------------------
forcedDifficulty    = "Custom";

// ----- Network / Timeout (permissive – nobody gets kicked) ----
disconnectTimeout   = 300;
maxDesync           = 150;
maxPing             = 200;
maxPacketLoss       = 50;
kickClientsOnSlowNetwork[] = { 0, 0, 0, 0 };

kickTimeout[]       = { { 0, 300 }, { 1, 300 }, { 2, 300 }, { 3, 300 } };
votingTimeOut[]     = { 60, 90 };
roleTimeOut[]       = { 90, 120 };
briefingTimeOut[]   = { 60, 90 };
debriefingTimeOut[] = { 60, 60 };
lobbyIdleTimeout    = 99999;
armaUnitsTimeout    = 30;

// ----- Security -----------------------------------------------
BattlEye            = 1;    // 0 = disabled (not recommended for public servers)
verifySignatures    = 2;    // 0=off, 1=v1+v2, 2=v2 only (recommended)
kickDuplicate       = 1;    // Kick duplicate GUIDs
allowedFilePatching = 1;    // 0=nobody, 1=HC only, 2=all clients
onUnsignedData      = "kick (_this select 0)";
onHackedData        = "kick (_this select 0)";
onDifferentData     = "";

// ----- Headless Clients ----------------------------------------
// Add the IP(s) of machines running HC processes.
// Use 127.0.0.1 if HC runs on the same machine as the server.
headlessClients[]   = {"127.0.0.1"};
localClient[]       = {"127.0.0.1"};   // Marks HC IPs as LAN (unlimited bandwidth)
battleyeLicense     = 1;

// ----- Logging ------------------------------------------------
logFile             = "server_console.log";
timeStampFormat     = "short";          // "none" | "short" | "full"

// ----- Allowed file types (restrict what clients can load) ---
allowedLoadFileExtensions[]     = {"hpp","sqs","sqf","fsm","cpp","paa","txt","xml",
                                    "inc","ext","sqm","ods","fxy","lip","csv","kb",
                                    "bik","bikb","html","htm","biedi","sqfc"};
allowedPreprocessFileExtensions[] = {"hpp","sqs","sqf","fsm","cpp","paa","txt","xml",
                                    "inc","ext","sqm","ods","fxy","lip","csv","kb",
                                    "bik","bikb","html","htm","biedi","sqfc"};
allowedHTMLLoadExtensions[]     = {"htm","html","xml","txt"};

// ----- Steam Query / Lobby ------------------------------------
steamProtocolMaxDataSize = 1024;
